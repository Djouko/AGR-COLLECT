proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Host $host;
proxy_pass http://service:8383;
proxy_redirect off;

# Prevent browser from caching API responses with different headers.
# Critical: requests with/without X-Extended-Metadata must not share cache.
proxy_hide_header Cache-Control;
add_header Cache-Control "no-store" always;
add_header Vary "X-Extended-Metadata, Authorization, Accept" always;

# buffer requests, but not responses, so streaming out works.
proxy_request_buffering on;
proxy_buffering off;
proxy_read_timeout 2m;
