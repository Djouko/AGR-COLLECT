# Be VERY careful modifying this file - it is modified BY LINE NUMBER in setup-odk.sh
server {
    # Listen on plain old HTTP and catch all requests so they can be redirected
    # to HTTPS instead.
    listen 80 default_server reuseport;
    listen [::]:80 default_server reuseport;
    server_name _;
    server_tokens off;

    # Anything requesting this particular URL should be served content from
    # Certbot's folder so the HTTP-01 ACME challenges can be completed for the
    # HTTPS certificates.
    location '/.well-known/acme-challenge' {
        default_type "text/plain";
        root /var/www/letsencrypt;
    }

    # Internal API paths used by Enketo - proxy directly to backend without redirect
    location /v1/ {
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Host $http_host;
        proxy_pass http://service:8383;
        proxy_redirect off;
    }

    # Everything else gets shunted over to HTTPS for each user defined
    # server to handle. Skip redirect if already behind a reverse proxy
    # (ngrok, cloudflare, etc.) that sets X-Forwarded-Proto: https.
    location / {
        # Direct HTTP access (no proxy) -> redirect to HTTPS as normal
        if ($http_x_forwarded_proto != "https") {
            return 301 https://$http_host$request_uri;
        }

        # Already HTTPS via reverse proxy -> forward to internal HTTPS server
        proxy_pass https://localhost:443;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

